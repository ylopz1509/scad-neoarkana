<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoArkana SCAD - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen flex">

<!-- SIDEBAR -->
<aside class="w-64 bg-white shadow-md p-6 hidden md:block">
  <h2 class="text-xl font-black text-emerald-600 mb-8">
    NeoArkana
  </h2>

  <nav class="space-y-4 text-sm">
    <a href="#" class="block text-gray-600 hover:text-emerald-600 font-semibold">
      <i class="fas fa-folder mr-2"></i> Documentos
    </a>

    <a href="#" class="block text-gray-600 hover:text-emerald-600">
      <i class="fas fa-chart-bar mr-2"></i> Reportes
    </a>

    <a href="#" class="block text-gray-600 hover:text-emerald-600">
      <i class="fas fa-cog mr-2"></i> Configuración
    </a>
  </nav>
</aside>

<!-- CONTENIDO -->
<div class="flex-1 p-8">

  <!-- HEADER -->
  <div class="flex justify-between items-center mb-8">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">
        Expediente Digital
      </h1>
      <p class="text-gray-500 text-sm">
        Gestiona tus permisos y evidencias.
      </p>
    </div>

    <button id="btn-abrir-modal"
      class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded-lg shadow">
      <i class="fas fa-cloud-upload-alt mr-2"></i> Subir documento
    </button>
  </div>

  <!-- RESUMEN -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">

    <div class="bg-white p-6 rounded-xl shadow-sm">
      <p class="text-sm text-gray-500">Total documentos</p>
      <h2 id="total-docs" class="text-3xl font-bold text-gray-800">0</h2>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm">
      <p class="text-sm text-gray-500">Legales</p>
      <h2 id="total-legales" class="text-3xl font-bold text-emerald-600">0</h2>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm">
      <p class="text-sm text-gray-500">Operativos</p>
      <h2 id="total-operativos" class="text-3xl font-bold text-blue-600">0</h2>
    </div>

  </div>

  <!-- FILTRO -->
  <div class="flex justify-between items-center mb-6">
    <h3 class="text-lg font-semibold text-gray-700">
      Documentos cargados
    </h3>

    <select id="filtro-documentos"
      class="bg-white border border-gray-300 py-2 px-4 rounded-lg">
      <option value="todos">Todos</option>
      <option value="legal">Legales</option>
      <option value="operativo">Operativos</option>
      <option value="fiscal">Fiscal</option>
    </select>
  </div>

  <!-- GRID -->
  <div id="contenedor-documentos"
    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
  </div>

</div>

<script src="js/documentos.js"></script>
</body>
</html>
