<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoArkana SCAD - Gestión de Cumplimiento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/auth.js"></script>
    <script>
        window.SCADAUTH.requireAuth();
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-slate-50 font-sans">

<nav class="bg-white border-b border-slate-200 px-6 py-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <h1 class="text-xl font-bold text-slate-800">
            Gestión de <span class="text-emerald-600">Checklists</span>
        </h1>
    </div>
</nav>

<main class="max-w-6xl mx-auto p-6 md:p-8">

    <h2 class="text-3xl font-black text-slate-800 mb-8">
        Control Normativo
    </h2>

    <div class="grid gap-4">

        <!-- 1 -->
        <div class="bg-white border rounded-2xl p-5">
            <div class="flex items-center gap-4">
                <input type="checkbox" data-id="inscripcion"
                    class="w-6 h-6 text-emerald-600">
                <h3 class="font-bold">Inscripción al Padrón de Generadores</h3>
            </div>
        </div>

        <!-- 2 -->
        <div class="bg-white border rounded-2xl p-5">
            <div class="flex items-center gap-4">
                <input type="checkbox" data-id="plan"
                    class="w-6 h-6 text-emerald-600">
                <h3 class="font-bold">Plan de Manejo de Residuos Especiales</h3>
            </div>
        </div>

        <!-- 3 -->
        <div class="bg-white border rounded-2xl p-5">
            <div class="flex items-center gap-4">
                <input type="checkbox" data-id="bitacora"
                    class="w-6 h-6 text-emerald-600">
                <h3 class="font-bold">Bitácora de Operación Mensual</h3>
            </div>
        </div>

        <!-- 4 -->
        <div class="bg-white border rounded-2xl p-5">
            <div class="flex items-center gap-4">
                <input type="checkbox" data-id="almacenamiento"
                    class="w-6 h-6 text-emerald-600">
                <h3 class="font-bold">Condiciones de Almacenamiento</h3>
            </div>
        </div>

    </div>

</main>

<script>
    // ===== CHECKLIST POR USUARIO =====

    const session = window.SCADAUTH.getSession();

    // Seguridad extra
    if (!session) {
        location.href = "login.html";
    }

    const CHECKLIST_KEY = "scad_checklist_" + session.email;

    function getChecklist() {
        const raw = localStorage.getItem(CHECKLIST_KEY);
        return raw ? JSON.parse(raw) : {};
    }

    function saveChecklist(data) {
        localStorage.setItem(CHECKLIST_KEY, JSON.stringify(data));
    }

    function loadChecklist() {
        const data = getChecklist();

        document.querySelectorAll("input[type='checkbox']").forEach(cb => {
            const id = cb.dataset.id;
            if (data[id]) {
                cb.checked = true;
            }
        });
    }

    function setupChecklistEvents() {
        document.querySelectorAll("input[type='checkbox']").forEach(cb => {
            cb.addEventListener("change", () => {
                const data = getChecklist();
                data[cb.dataset.id] = cb.checked;
                saveChecklist(data);
            });
        });
    }

    loadChecklist();
    setupChecklistEvents();
</script>

</body>
</html>
