<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alertas | NeoArkana SCAD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen">

    <nav class="bg-white border-b border-gray-200 p-4 mb-8">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <span class="text-xl font-bold text-slate-800">Gestión de <span class="text-[#b91c1c]">Alertas</span></span>
            <a href="index.html" class="bg-[#b91c1c] hover:bg-[#008f65] text-white px-4 py-2 rounded-lg transition-all flex items-center gap-2 text-sm font-semibold">
                <i class="fas fa-arrow-left"></i> Volver al Inicio
            </a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4">
        <header class="mb-10 text-center md:text-left">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight flex items-center gap-4">
                <div class="bg-red-100 p-3 rounded-2xl">
                    <i class="fas fa-bell text-red-600"></i>
                </div>
                Centro de Notificaciones
            </h1>
            <p class="text-slate-500 mt-3 text-lg">
                Monitoreo en tiempo real de cumplimientos y vencimientos legales.
            </p>
        </main>

        <section id="contenedor-alertas" class="grid gap-6">
            </section>

        <div id="sin-alertas" class="hidden mt-12 p-10 bg-white rounded-3xl border-2 border-dashed border-emerald-200 text-center">
            <div class="bg-emerald-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-check-circle text-emerald-600 text-4xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-emerald-900">Estado: Óptimo</h2>
            <p class="text-emerald-700/70 mt-2">Todos los permisos y bitácoras se encuentran vigentes.</p>
        </div>
    </main>

    <script src="js/alertas.js"></script>
</body>
</html>
