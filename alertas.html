<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NeoArkana SCAD – Alertas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-slate-50 min-h-screen font-sans">

<!-- NAVBAR -->
<nav class="bg-white border-b border-slate-200 px-6 py-4 shadow-sm">
    <div class="max-w-6xl mx-auto flex justify-between items-center">

        <h1 class="text-xl font-bold text-slate-800">
            Gestión de <span class="text-rose-600">Alertas</span>
        </h1>

        <a href="index.html"
           class="flex items-center gap-2 bg-rose-600 text-white px-4 py-2 rounded-xl shadow-sm hover:bg-rose-700 transition">
            <i class="fas fa-arrow-left"></i>
            Inicio
        </a>

    </div>
</nav>

<!-- MAIN -->
<main class="max-w-6xl mx-auto p-6 md:p-8">

    <!-- HEADER -->
    <div class="mb-8">
        <h2 class="text-3xl font-black text-slate-800 flex items-center gap-3">
            <i class="fas fa-bell text-rose-600"></i>
            Centro de Notificaciones
        </h2>

        <p class="text-sm text-slate-500 mt-2">
            Monitoreo en tiempo real de cumplimientos y vencimientos legales.
        </p>
    </div>

    <!-- CONTENEDOR ALERTAS -->
    <div id="contenedor-alertas" class="grid gap-5">
        <!-- Las alertas se renderizan dinámicamente -->
    </div>

    <!-- SIN ALERTAS -->
    <div id="sin-alertas"
         class="hidden mt-10 bg-white border rounded-2xl p-8 shadow-sm text-center">

        <div class="w-16 h-16 bg-rose-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-check-circle text-rose-600 text-2xl"></i>
        </div>

        <h3 class="text-lg font-bold text-slate-800">
            Estado: Óptimo
        </h3>

        <p class="text-sm text-slate-500 mt-2">
            Todos los permisos y bitácoras se encuentran vigentes.
        </p>
    </div>

</main>

<!-- JS -->
<script src="js/alertas.js"></script>

</body>
</html>
