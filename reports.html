<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoArkana SCAD - Reportes</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="js/auth.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<!-- Librerías -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
window.SCADAUTH.requireAuth();
</script>

</head>

<body class="bg-slate-50 font-sans">

<!-- NAVBAR -->
<nav class="bg-white border-b border-slate-200 px-6 py-4 shadow-sm">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        
        <h1 class="text-xl font-bold text-slate-800">
            Gestión de <span class="text-amber-600">Reportes</span>
        </h1>

        <a href="index.html"
        class="flex items-center gap-2 bg-amber-600 text-white px-4 py-2 rounded-xl shadow-sm hover:bg-amber-700 transition">
            <i class="fas fa-arrow-left"></i>
            Inicio
        </a>

    </div>
</nav>

<main class="max-w-6xl mx-auto p-6 md:p-8">

<h2 class="text-3xl font-black text-slate-800 mb-6">
    Reportes Oficiales
</h2>

<!-- EMPRESA ACTIVA -->
<div class="bg-white border rounded-2xl p-6 mb-8 shadow-sm">
    <p class="text-sm text-slate-500">Empresa activa</p>
    <p id="empresaActiva" class="font-bold text-lg text-amber-600">
        Cargando empresa...
    </p>
</div>

<!-- GENERAR REPORTE -->
<div class="bg-white border rounded-2xl p-6 mb-8 shadow-sm">
    <h3 class="text-lg font-bold mb-4">
        Generar Reporte
    </h3>

    <div class="grid md:grid-cols-2 gap-6 mb-6">

        <div>
            <label class="block text-sm font-semibold mb-2">Periodo</label>
            <input type="month" id="periodo"
            class="w-full border rounded-xl p-3 focus:ring-2 focus:ring-amber-500 outline-none">
        </div>

        <div>
            <label class="block text-sm font-semibold mb-2">Tipo de Reporte</label>
            <select id="tipoReporte"
            class="w-full border rounded-xl p-3 focus:ring-2 focus:ring-amber-500 outline-none">
                <option value="Cumplimiento General">Cumplimiento General</option>
                <option value="Permisos">Permisos</option>
                <option value="Inspección Ambiental">Inspección Ambiental</option>
            </select>
        </div>

    </div>

    <div class="flex gap-4 flex-wrap">
        <button onclick="generarPDF()"
        class="bg-amber-600 text-white px-6 py-3 rounded-xl hover:bg-amber-700 transition flex items-center gap-2">
            <i class="fas fa-file-pdf"></i>
            Descargar PDF
        </button>

        <button onclick="generarExcel()"
        class="bg-amber-500 text-white px-6 py-3 rounded-xl hover:bg-amber-600 transition flex items-center gap-2">
            <i class="fas fa-file-excel"></i>
            Descargar Excel
        </button>
    </div>
</div>

<!-- HISTORIAL -->
<div class="bg-white border rounded-2xl p-6 shadow-sm">
    <h3 class="text-lg font-bold mb-4">
        Historial y Trazabilidad
    </h3>

    <div id="historialContainer" class="grid gap-4">
        <!-- Aquí se cargan los reportes -->
    </div>
</div>

</main>

<script src="js/reports.js"></script>

</body>
</html>
